# sdks.yml
# CI for the DASH language SDKs: Go, Python, and TypeScript.
# Runs on every push/PR to main; three parallel jobs, one per language.
# Expected runtime: ~3-6 minutes per job.
name: SDKs CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: sdks-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    name: Go SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/go
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go 1.22
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache-dependency-path: sdks/go/go.sum

      - name: go vet
        run: go vet ./...

      - name: go test (race detector)
        run: go test -race ./...

  python:
    name: Python SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            sdks/python/requirements.txt
            sdks/python/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: pytest
        run: pytest -v

  typescript:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/typescript
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json

      - name: npm ci
        run: npm ci

      - name: npm run build
        run: npm run build

      - name: npm test
        run: npm test
