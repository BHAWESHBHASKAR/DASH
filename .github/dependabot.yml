# dependabot.yml
# Automated dependency updates for the DASH monorepo.
# Grouped per ecosystem to keep PR volume manageable.
version: 2

updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps(rust)"
    labels:
      - "dependencies"
    groups:
      rust-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/sdks/python"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps(python)"
    labels:
      - "dependencies"
    groups:
      python-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directory: "/sdks/go"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps(go)"
    labels:
      - "dependencies"
    groups:
      go-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/sdks/typescript"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps(ts)"
    labels:
      - "dependencies"
    groups:
      typescript-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/.github/workflows"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci(actions)"
    labels:
      - "dependencies"
    groups:
      github-actions-updates:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/deploy/container"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps(docker)"
    labels:
      - "dependencies"
