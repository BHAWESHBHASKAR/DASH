{{- if .Values.serviceAccount.create -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "dash.retrievalServiceAccountName" . }}
  namespace: {{ .Values.namespace.name | default "dash-system" }}
  labels:
    {{- include "dash.labels" . | nindent 4 }}
    app.kubernetes.io/component: retrieval
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "dash.ingestionServiceAccountName" . }}
  namespace: {{ .Values.namespace.name | default "dash-system" }}
  labels:
    {{- include "dash.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingestion
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
