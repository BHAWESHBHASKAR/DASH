{{- if .Values.ingress.enabled -}}
{{- $svcPort := .Values.service.ports.http -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "dash.componentName" (list . "retrieval") }}
  namespace: {{ .Values.namespace.name | default "dash-system" }}
  labels:
    {{- include "dash.labels" . | nindent 4 }}
    app.kubernetes.io/component: retrieval
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
  {{- range .Values.ingress.hosts }}
  - host: {{ .host | quote }}
    http:
      paths:
      {{- range .paths }}
      - path: {{ .path }}
        pathType: {{ .pathType | default "Prefix" }}
        backend:
          service:
            name: {{ include "dash.componentName" (list $ "retrieval") }}
            port:
              number: {{ $svcPort }}
      {{- end }}
  {{- end }}
{{- end }}
