{{- if .Values.networkPolicy.enabled -}}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "dash.fullname" . }}-default-deny
  namespace: {{ .Values.namespace.name | default "dash-system" }}
  labels:
    {{- include "dash.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "dash.fullname" . }}-allow-dns
  namespace: {{ .Values.namespace.name | default "dash-system" }}
  labels:
    {{- include "dash.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "dash.fullname" . }}-retrieval-egress
  namespace: {{ .Values.namespace.name | default "dash-system" }}
  labels:
    {{- include "dash.labels" . | nindent 4 }}
    app.kubernetes.io/component: retrieval
spec:
  podSelector:
    matchLabels:
      {{- include "dash.retrievalSelectorLabels" . | nindent 6 }}
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          {{- include "dash.ingestionSelectorLabels" . | nindent 10 }}
    ports:
    - port: 8081
      protocol: TCP
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        {{- range .Values.networkPolicy.internalCIDRs }}
        - {{ . }}
        {{- end }}
    ports:
    {{- range .Values.networkPolicy.externalEgressPorts }}
    - port: {{ .port }}
      protocol: {{ .protocol | default "TCP" }}
    {{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "dash.fullname" . }}-allow-nginx
  namespace: {{ .Values.namespace.name | default "dash-system" }}
  labels:
    {{- include "dash.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "dash.retrievalSelectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace }}
      podSelector:
        {{- toYaml .Values.networkPolicy.ingressPodSelector | nindent 8 }}
    ports:
    - port: http
      protocol: TCP
    - port: http-alt
      protocol: TCP
{{- end }}
