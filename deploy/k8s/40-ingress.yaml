---
# Public ingress for the OpenAI-compatible /v1/* surface exposed by
# the retrieval service. Ingestion is intentionally not exposed: it
# is reachable only from inside the cluster (see 50-networkpolicy).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dash-retrieval
  namespace: dash-system
  labels:
    app.kubernetes.io/part-of: dash
    app.kubernetes.io/name: dash
    app.kubernetes.io/component: retrieval
  annotations:
    # Allow 10 MiB request bodies (chunked embedding payloads).
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Per-IP rate limit: 100 requests/second, burst 200.
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-rps-burst: "200"
    # Bump proxy timeouts: embedding lookups against OpenAI/Ollama can
    # exceed the default 60s when the upstream is slow.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # Tell cert-manager to mint a certificate for this host.
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Standard hardening headers.
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "Referrer-Policy: no-referrer";
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - dash.example.com
    secretName: dash-retrieval-tls
  rules:
  - host: dash.example.com
    http:
      paths:
      - path: /v1
        pathType: Prefix
        backend:
          service:
            name: dash-retrieval
            port:
              number: 80
      - path: /health
        pathType: Exact
        backend:
          service:
            name: dash-retrieval
            port:
              number: 80
