---
apiVersion: v1
kind: Namespace
metadata:
  name: dash-system
  labels:
    app.kubernetes.io/part-of: dash
    app.kubernetes.io/managed-by: kubectl
    name: dash-system
    # pod-security.kubernetes.io labels (Kubernetes 1.25+: use the
    # `pod-security.admission.config.k8s.io/v1` configuration form in
    # real clusters; these labels are kept for parity with cluster
    # policies that still rely on them).
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
