---
# Sensitive runtime configuration. Treat as opaque blobs: the chart /
# manifests only need the keys, not the values.
#
# In a real cluster, replace the literal `change-me` placeholders with
# the actual material via one of:
#   * `kubectl create secret ... --from-literal=...`
#   * External Secrets Operator backed by Vault/AWS SM/GSM
#   * Sealed Secrets committed alongside the manifests
#   * SOPS-encrypted files
#
# The Secret is intentionally split per service so that a compromised
# pod can only read the keys it needs (each pod mounts only its own
# Secret).
apiVersion: v1
kind: Secret
metadata:
  name: dash-retrieval-secrets
  namespace: dash-system
  labels:
    app.kubernetes.io/part-of: dash
    app.kubernetes.io/component: retrieval
type: Opaque
stringData:
  # PEM-encoded public key (RS256/ES256) used to verify JWTs.
  DASH_RETRIEVAL_JWT_PUBLIC_KEY: "change-me-jwt-public-key"
  # Optional shared HMAC secret (HS256). Leave empty when using RS256.
  DASH_RETRIEVAL_JWT_HS256_SECRET: "change-me-retrieval-jwt"
  # Static API key for service-to-service auth.
  DASH_RETRIEVAL_API_KEY: "change-me-retrieval-key"
  # OpenAI API key (only required when DASH_EMBEDDING_PROVIDER=openai).
  DASH_OPENAI_API_KEY: "change-me-openai-api-key"
  # Ollama base URL (only required when DASH_EMBEDDING_PROVIDER=ollama).
  DASH_OLLAMA_BASE_URL: "http://ollama.ollama.svc.cluster.local:11434"
---
apiVersion: v1
kind: Secret
metadata:
  name: dash-ingestion-secrets
  namespace: dash-system
  labels:
    app.kubernetes.io/part-of: dash
    app.kubernetes.io/component: ingestion
type: Opaque
stringData:
  DASH_INGESTION_JWT_PUBLIC_KEY: "change-me-jwt-public-key"
  DASH_INGESTION_JWT_HS256_SECRET: "change-me-ingest-jwt"
  DASH_INGESTION_API_KEY: "change-me-ingest-key"
