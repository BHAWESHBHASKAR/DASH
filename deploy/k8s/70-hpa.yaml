---
# Reactive horizontal scaling. Both services share the same bounds
# (min 2, max 10, target 70% CPU) so that a traffic burst is absorbed
# symmetrically. The StatefulSet scaling policy is conservative by
# default; we override it to allow faster scale-up while keeping
# scale-down deliberate (data-bearing pods).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dash-retrieval
  namespace: dash-system
  labels:
    app.kubernetes.io/part-of: dash
    app.kubernetes.io/name: dash
    app.kubernetes.io/component: retrieval
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: dash-retrieval
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 25
        periodSeconds: 60
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dash-ingestion
  namespace: dash-system
  labels:
    app.kubernetes.io/part-of: dash
    app.kubernetes.io/name: dash
    app.kubernetes.io/component: ingestion
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: dash-ingestion
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 25
        periodSeconds: 60
