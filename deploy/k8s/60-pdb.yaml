---
# Voluntary disruption budgets. Either Service is allowed to lose at
# most one replica; node drains, cluster autoscaler scale-down, and
# version rollouts are all gated on this.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dash-retrieval
  namespace: dash-system
  labels:
    app.kubernetes.io/part-of: dash
    app.kubernetes.io/name: dash
    app.kubernetes.io/component: retrieval
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dash
      app.kubernetes.io/component: retrieval
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dash-ingestion
  namespace: dash-system
  labels:
    app.kubernetes.io/part-of: dash
    app.kubernetes.io/name: dash
    app.kubernetes.io/component: ingestion
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dash
      app.kubernetes.io/component: ingestion
